name: Deploy API to Cloud Run

on:
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/deploy-cloud-run.yml"
  workflow_dispatch:

env:
  PROJECT_ID: kgs-service-app
  # Must match Pulumi stack config: infra/Pulumi.prod.yaml → gcp:region
  REGION: us-west1
  SERVICE: service-app-api
  AR_REPOSITORY: service-app
  RUNTIME_SA: service-app-api@kgs-service-app.iam.gserviceaccount.com

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Verify GCP_SA_KEY secret is configured
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::error::GitHub secret GCP_SA_KEY is missing or empty."
            echo "After pulumi up, run: pulumi stack output github_deploy_sa_key_json --show-secrets"
            echo "Add the full JSON at repo Settings → Secrets and variables → Actions → GCP_SA_KEY"
            exit 1
          fi

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push container
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPOSITORY }}/api
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPOSITORY }}/api:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --service-account=${{ env.RUNTIME_SA }}
            --set-secrets=OPENROUTER_API_KEY=openrouter-api-key:latest
            --set-env-vars=OPENROUTER_HTTP_REFERER=https://github.com/kirtquist/service-app,OPENROUTER_X_TITLE=Service App MVP
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --timeout=60

      - name: Show service URL
        run: gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)'
